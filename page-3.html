<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Project — Page 3</title>

  <!-- Shared CSS foundation -->
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/page-3.css" />
</head>

<body>
  <header class="site-header">
    <div class="container site-header__inner">
      <a href="index.html" class="logo"><span class="logo__mark">&lt;/&gt;</span>simpleWeb</a>
      <nav class="site-nav" aria-label="Primary">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="page-2.html">About</a></li>
          <li><a href="page-3.html" aria-current="page">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>
  <main>
    <section class="contact-page container">

      <div class="contact-wrapper">
        <aside class="contact-overview">
          <p class="contact-intro">For commissions and project inquiries, please email:</p>
          <a href="mailto:hello@example.com" class="contact-email">hello@example.com</a>
          <p class="contact-intro">or send a message via this form</p>
        </aside>

        <form class="contact-form" action="#" method="post">
          <div class="form-row">
            <div class="form-group">
              <label for="name">First Name</label>
              <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
              <label for="last-name">Last Name</label>
              <input type="text" id="last-name" name="last-name">
            </div>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>

          <button type="button" class="btn">Send Message</button>
        </form>
      </div>

      <div class="contact-info">

        <p>Phone: +1 (555) 123-4567</p>
        <p>Address: 123 Main Street, City, Country</p>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="site-footer__inner">
      <p class="site-footer__text">
        &copy; 2026 simpleWeb. All rights reserved. Built with vanilla HTML and CSS.
      </p>
    </div>
  </footer>
</body>

</html>
