<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Project — Home</title>

    <!-- Shared CSS foundation -->
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/base.css" />
    <!-- Page-specific styles -->
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <!-- Section 1: Header + Hero  — owner: Ziuling -->
    <section class="hero-block">
      <header class="site-header container">
        <a href="index.html" class="logo">Header Logo</a>
        <nav class="site-nav" aria-label="Primary">
          <ul class="nav-list">
            <li><a href="page-2.html">header link one</a></li>
            <li><a href="page-3.html">header link two</a></li>
            <li><a href="page-3.html">header link three</a></li>
          </ul>
        </nav>
      </header>

      <!-- Hero: two columns (text + image)
       The div tag is used to group elements by design; 
       no specific semantic tag is needed here. -->
      <div class="hero container">
        <div class="hero__text">
          <h1 class="hero__title">This website is awesome</h1>
          <p class="hero__subtext">
            This website has some subtext that goes here under the main title.
            It's a smaller font and the color is lower contrast.
          </p>
          <a href="page-3.html" class="btn">Sign up</a>
        </div>
        <img
          class="hero__image"
          src="img/hero-placeholder.jpg"
          alt="Decorative hero image"
        />
      </div>
    </section>

    <!-- Section 2: Some random information (4 cards) — owner: Ziuling -->
    <section class="info container">
      <h2 class="info__heading">Moments worth slowing down for.</h2>

      <ul class="cards">
        <li class="card">
          <figure class="card__figure">
            <img
              class="card__img"
              src="img/card-boathouse.jpg"
              alt="A wooden boathouse on a still lake under a starry night sky"
            />
            <figcaption class="card__caption">
              A quiet boathouse rests on still water beneath a sky full of stars.
            </figcaption>
          </figure>
        </li>
        <li class="card">
          <figure class="card__figure">
            <img
              class="card__img"
              src="img/card-swings.jpg"
              alt="A row of empty swings in a park at dusk"
            />
            <figcaption class="card__caption">
              Empty swings in the park, waiting for the next burst of laughter.
            </figcaption>
          </figure>
        </li>
        <li class="card">
          <figure class="card__figure">
            <img
              class="card__img"
              src="img/card-waterdrops.jpg"
              alt="Close-up of water droplets scattered across a surface"
            />
            <figcaption class="card__caption">
              Tiny water droplets turn an ordinary surface into a constellation.
            </figcaption>
          </figure>
        </li>
        <li class="card">
          <figure class="card__figure">
            <img
              class="card__img"
              src="img/card-surfboard.jpg"
              alt="A surfboard lying on the sand as the sun sets over the ocean"
            />
            <figcaption class="card__caption">
              A surfboard on the sand as the sun melts into the ocean.
            </figcaption>
          </figure>
        </li>
      </ul>
    </section>

    <!-- Section 3: Quote / testimonial — owner: Monica -->

    <!-- Section 4: Call to action — owner: Monica -->

    <!-- Footer — owner: Monica -->
  </body>
</html>
